<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitoreo Data Center BP</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* Documentación interna
           Autor: Cristopher Gerardo García Escoto (cris.garcia1803@gmail.com)
           Proyecto: Practicante - Banco Promerica
           Colegio: Colegio Suizo Americano
           Fin en mente: Optimizar el Monitoreo de servidores en el Data center 
           Historia: 27/05/2026 - 28/05/2026 - 29/05/2026 - 01/06/2026
        */
           

        body {
            margin: 0;
            padding: 20px;
            background-color: #098E09;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* --- DISEÑO VISUAL ORIGINAL RESTAURADO (LÍNEAS DE CONTENEDORES CORRIDAS) --- */
        .fila-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            align-items: flex-end;
        }

        .flex-group {
            display: flex;
            flex-direction: column;
        }

        .flex-group label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
        }

        .flex-group label.highlight {
            color: #ADFF2F;
        }

        input, select {
            font-size: 13px;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid #ccc;
            color: black;
            box-sizing: border-box;
            height: 28px;
        }

        /* --- BOTONERA VERDE ORIGINAL --- */
        .acciones-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 6px 16px;
            background-color: #ADFF2F;
            color: black;
            border: 1px solid #7a7a7a;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            height: 32px;
        }
        .btn:hover {
            background-color: #96db29;
        }
        .btn-danger {
            background-color: #FF6B6B;
            color: white;
        }
        .btn-danger:hover {
            background-color: #e05353;
        }

        /* --- FILTRO POR GABINETE ORIGINAL --- */
        .barra-filtrado {
            background-color: #055405;
            padding: 8px;
            border: 1px solid #ADFF2F;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 4px;
        }
        .barra-filtrado label {
            font-size: 13px;
            font-weight: bold;
            color: white;
        }

        .status-label {
            font-size: 13px;
            font-style: italic;
            color: #ADFF2F;
            margin-bottom: 10px;
            display: block;
        }

        /* --- TREEVIEW / TABLA ORIGINAL ESTILO EXCEL --- */
        .frame-tree {
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            max-height: 450px;
            overflow: auto;
        }

        .excel-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
            color: black;
        }

        .excel-table th {
            background-color: #b4c6e7;
            color: black;
            font-weight: bold;
            border: 1px solid #7a7a7a;
            padding: 6px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .excel-table td {
            border: 1px solid #7a7a7a;
            padding: 5px;
            white-space: nowrap;
        }

        .excel-table tr.optimo { background-color: #e2efda; }
        .excel-table tr.alertado { background-color: #fff2cc; }
        .excel-table tr.fallo { background-color: #fce4d6; }
        
        .excel-table tr.selected {
            background-color: #cce5ff !important;
        }
    </style>
</head>
<body>

    <h1 style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">Monitoreo Data Center BP</h1>

    <div class="fila-inputs">
        <div class="flex-group">
            <label>Fecha:</label>
            <input type="text" id="txt_fecha" style="width: 100px;">
        </div>
        <div class="flex-group">
            <label>Operador / Responsable:</label>
            <input type="text" id="operador" style="width: 180px;">
        </div>
        <div class="flex-group">
            <label>Horario Chequeo:</label>
            <select id="cb_horario" style="width: 110px;">
                <option value="04:00 AM">04:00 AM</option>
                <option value="10:00 AM">10:00 AM</option>
                <option value="16:00 PM">16:00 PM</option>
                <option value="22:00 PM">22:00 PM</option>
            </select>
        </div>
        <div class="flex-group">
            <label class="highlight">Pasillo Frío Temp (°C):</label>
            <input type="text" id="p_frio_temp" style="width: 80px;">
        </div>
        <div class="flex-group">
            <label class="highlight">Pasillo Frío Hum (%):</label>
            <input type="text" id="p_frio_hum" style="width: 80px;">
        </div>
        <div class="flex-group">
            <label class="highlight">Pasillo Cal. Temp (°C):</label>
            <input type="text" id="p_cal_temp" style="width: 80px;">
        </div>
        <div class="flex-group">
            <label class="highlight">Pasillo Cal. Hum (%):</label>
            <input type="text" id="p_cal_hum" style="width: 80px;">
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #ADFF2F; margin: 15px 0;">

    <div class="fila-inputs">
        <div class="flex-group">
            <label>Gabinete</label>
            <select id="cb_gabinete" style="width: 130px;"></select>
        </div>
        <div class="flex-group">
            <label>Nombre Equipo</label>
            <input type="text" id="nombre" style="width: 150px;">
        </div>
        <div class="flex-group">
            <label>Marca</label>
            <input type="text" id="marca" style="width: 100px;">
        </div>
        <div class="flex-group">
            <label>Modelo</label>
            <input type="text" id="modelo" style="width: 130px;">
        </div>
        <div class="flex-group">
            <label>RU#</label>
            <input type="text" id="ru_val" style="width: 55px;">
        </div>
        <div class="flex-group">
            <label>Serie</label>
            <input type="text" id="serie" style="width: 140px;">
        </div>
        <div class="flex-group">
            <label>Estatus</label>
            <select id="cb_estado" style="width: 100px;">
                <option value="Óptimo">Óptimo</option>
                <option value="Alertado">Alertado</option>
                <option value="Fallo">Fallo</option>
            </select>
        </div>
        <div class="flex-group">
            <label class="highlight">Medición Turno</label>
            <input type="text" id="medicion_individual" style="width: 110px;">
        </div>
        <div class="flex-group">
            <label>Observaciones</label>
            <input type="text" id="txt_observaciones" style="width: 180px;">
        </div>
    </div>

    <span id="er" class="status-label">Excel activo: Ninguno</span>

    <input type="file" id="file_picker" accept=".xlsx" style="display:none" onchange="cargar_archivo(event)">

    <div class="acciones-container">
        <button class="btn" onclick="crear()">Abrir / Crear</button>
        <button class="btn" onclick="guardar()">Guardar Registro</button>
        <button class="btn" onclick="mostrar_por_gabinete()">Mostrar Todo</button>
        <button class="btn" onclick="modificar()">Modificar Celda</button>
        <button class="btn" onclick="confirmar_estatus()">Confirmar Turno</button>
        <button class="btn btn-danger" onclick="limpiar_registro()">Limpiar Registro</button>
    </div>

    <div class="barra-filtrado">
        <label>FILTRAR VISTA POR GABINETE (PÁGINAS):</label>
        <select id="cb_filtro_gabinete" onchange="mostrar_por_gabinete()" style="width: 180px;">
            <option value="TODOS">-- Ver Todo el Excel --</option>
        </select>
    </div>

    <div class="frame-tree">
        <table class="excel-table">
            <thead>
                <tr>
                    <th style="width: 110px;">Gabinete</th>
                    <th style="width: 160px;">Nombre Equipo</th>
                    <th style="width: 90px;">Marca</th>
                    <th style="width: 130px;">Modelo</th>
                    <th style="width: 60px;">RU#</th>
                    <th style="width: 130px;">Serie</th>
                    <th style="width: 85px;">04:00 am</th>
                    <th style="width: 85px;">10:00 am</th>
                    <th style="width: 85px;">16:00 pm</th>
                    <th style="width: 85px;">22:00 pm</th>
                    <th style="width: 90px;">Estado</th>
                    <th style="width: 220px;">Observaciones</th>
                </tr>
            </thead>
            <tbody id="tree_body"></tbody>
        </table>
    </div>

<script>
    let ruta_excel_name = null;
    let workbook_data = null;
    let fila_seleccionada_idx = null;

    const mapa_columnas_horario = {"04:00 AM": 7, "10:00 AM": 8, "16:00 PM": 9, "22:00 PM": 10};
    const col_observaciones = 12;

    window.onload = function() {
        const cb_gabinete = document.getElementById("cb_gabinete");
        const cb_filtro = document.getElementById("cb_filtro_gabinete");
        
        for(let i=1; i<=16; i++) {
            let gabText = `GABINETE #${i}`;
            let opt1 = document.createElement("option"); opt1.value = gabText; opt1.textContent = gabText;
            cb_gabinete.appendChild(opt1);

            let opt2 = document.createElement("option"); opt2.value = gabText; opt2.textContent = gabText;
            cb_filtro.appendChild(opt2);
        }
        
        cb_gabinete.value = "GABINETE #1";
        cb_filtro.value = "TODOS";

        const hoy = new Date();
        document.getElementById("txt_fecha").value = `${String(hoy.getDate()).padStart(2,'0')}/${String(hoy.getMonth()+1).padStart(2,'0')}/${hoy.getFullYear()}`;
        document.getElementById("cb_horario").value = "04:00 AM";
        document.getElementById("cb_estado").value = "Óptimo";
    };

    function _fila_es_encabezado(valor) {
        if (!valor) return false; // Modificado: Un valor vacío no se considera encabezado por defecto, permitiendo ver filas limpias
        let s = String(valor).toUpperCase().trim();
        return s === "NOMBRE" || s === "MARCA" || s === "MODELO" || s.includes("HORA VERIFICACION") || s.includes("DATA CENTER") || s.includes("FECHA:");
    }

    function _tag_estado(estado) {
        let e = !estado ? "" : String(estado).toLowerCase().trim();
        if(e.includes("fallo")) return "fallo";
        if(e.includes("alert")) return "alertado";
        return "optimo";
    }

    function crear() {
        let respuesta = confirm("¿Desea abrir un archivo Excel ya existente?\n\n[Aceptar] = Buscar archivo en el equipo.\n[Cancelar] = Crear un nuevo documento limpio.");
        if (respuesta) {
            document.getElementById("file_picker").value = ""; 
            document.getElementById("file_picker").click();
        } else {
            workbook_data = XLSX.utils.book_new();
            let ws = {};
            ws['!ref'] = "A1:L300";
            ws['B13'] = {t: 's', v: "GABINETE #1"};
            
            XLSX.utils.book_append_sheet(workbook_data, {}, "Portada");
            XLSX.utils.book_append_sheet(workbook_data, ws, "Hoja2");
            
            ruta_excel_name = "Monitoreo_Data_Center.xlsx";
            document.getElementById("er").textContent = `Excel activo: ${ruta_excel_name} (Nuevo Libro)`;
            alert("Se ha inicializado un libro con la estructura adecuada.");
            mostrar_por_gabinete();
        }
    }

    function cargar_archivo(e) {
        let file = e.target.files[0];
        if (!file) return;
        ruta_excel_name = file.name;
        
        let reader = new FileReader();
        reader.onload = function(evt) {
            try {
                let data = new Uint8Array(evt.target.result);
                workbook_data = XLSX.read(data, { type: 'array' });
                document.getElementById("er").textContent = `Excel activo: ${ruta_excel_name}`;
                document.getElementById("cb_filtro_gabinete").value = "TODOS";
                mostrar_por_gabinete();
            } catch(err) {
                alert("Error al mapear las celdas del documento.");
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function obtener_celda(ws, r, c) {
        let cell_ref = XLSX.utils.encode_cell({r: r - 1, c: c - 1});
        return ws[cell_ref] ? ws[cell_ref].v : "";
    }

    function asignar_celda(ws, r, c, val) {
        let cell_ref = XLSX.utils.encode_cell({r: r - 1, c: c - 1});
        ws[cell_ref] = { t: 's', v: String(val) };
    }

    // --- PROCESADOR ADAPTADO PARA MOSTRAR FILAS CON CAMPOS VACÍOS ---
    function mostrar_por_gabinete() {
        if(!workbook_data) return;
        const tbody = document.getElementById("tree_body");
        tbody.innerHTML = "";
        fila_seleccionada_idx = null;

        let sheetName = workbook_data.SheetNames[1] ? workbook_data.SheetNames[1] : workbook_data.SheetNames[0];
        let hoja = workbook_data.Sheets[sheetName];
        let filtro = document.getElementById("cb_filtro_gabinete").value;

        let gabinete_actual_contexto = "GABINETE #1"; 

        for(let fila = 13; fila <= 600; fila++) {
            let celda_b = obtener_celda(hoja, fila, 2);
            let celda_b_str = String(celda_b).toUpperCase().replace(/\s+/g, ' ').trim();

            // Detectamos si es un separador de gabinete
            if(celda_b_str.includes("GABINETE") || celda_b_str.includes("RACK")) {
                let num = celda_b_str.match(/\d+/);
                gabinete_actual_contexto = num ? `GABINETE #${parseInt(num[0])}` : celda_b_str;
                continue;
            }

            // Omitimos únicamente si es un encabezado repetido de títulos (como la palabra "NOMBRE")
            if(!_fila_es_encabezado(celda_b)) {
                
                // Aplicamos el filtro de visualización por página/gabinete
                if(filtro !== "TODOS" && gabinete_actual_contexto !== filtro) continue;

                let mar = obtener_celda(hoja, fila, 3);
                let mod = obtener_celda(hoja, fila, 4);
                let ru  = obtener_celda(hoja, fila, 5);
                let ser = obtener_celda(hoja, fila, 6);
                
                let h04 = obtener_celda(hoja, fila, 7);
                let h10 = obtener_celda(hoja, fila, 8);
                let h16 = obtener_celda(hoja, fila, 9);
                let h22 = obtener_celda(hoja, fila, 10);
                
                let est = obtener_celda(hoja, fila, 11) || "Óptimo";
                let obs = obtener_celda(hoja, fila, col_observaciones);

                // Si absolutamente todas las celdas de datos están vacías, podemos asumir que es el final o una fila en blanco real fuera de rango
                if (!celda_b && !mar && !mod && !ru && !ser && !h04 && !h10 && !h16 && !h22 && !obs) {
                    // Opcional: Puedes dejar que dibuje la fila vacía o saltarla si deseas limpiar el final del archivo.
                    // Para tu requerimiento de mostrar campos vacíos de equipos existentes, permitimos el renderizado:
                }

                let tr = document.createElement("tr");
                tr.className = _tag_estado(est);
                tr.dataset.filaExcel = fila;
                
                tr.innerHTML = `
                    <td style="text-align:center; font-weight:bold;">${gabinete_actual_contexto}</td>
                    <td>${celda_b}</td>
                    <td style="text-align:center;">${mar}</td>
                    <td style="text-align:center;">${mod}</td>
                    <td style="text-align:center;">${ru}</td>
                    <td style="text-align:center;">${ser}</td>
                    <td style="text-align:center;">${h04}</td>
                    <td style="text-align:center;">${h10}</td>
                    <td style="text-align:center;">${h16}</td>
                    <td style="text-align:center;">${h22}</td>
                    <td style="text-align:center;">${est}</td>
                    <td>${obs}</td>
                `;
                
                tr.onclick = function() {
                    let rows = tbody.getElementsByTagName("tr");
                    for(let r of rows) r.classList.remove("selected");
                    tr.classList.add("selected");
                    fila_seleccionada_idx = fila;
                    cargar_seleccion(gabinete_actual_contexto, celda_b, mar, mod, ru, ser, h04, h10, h16, h22, est, obs);
                };
                tbody.appendChild(tr);
            }
        }
    }

    function cargar_seleccion(gab, nom, mar, mod, ru, ser, h04, h10, h16, h22, est, obs) {
        if(document.getElementById("cb_gabinete").querySelector(`option[value="${gab}"]`)) {
            document.getElementById("cb_gabinete").value = gab;
        }
        document.getElementById("nombre").value = nom;
        document.getElementById("marca").value = mar;
        document.getElementById("modelo").value = mod;
        document.getElementById("ru_val").value = ru; 
        document.getElementById("serie").value = ser; 

        let turno = document.getElementById("cb_horario").value;
        let med = (turno === "04:00 AM") ? h04 : (turno === "10:00 AM") ? h10 : (turno === "16:00 PM") ? h16 : h22;

        document.getElementById("medicion_individual").value = med;
        document.getElementById("cb_estado").value = est;
        document.getElementById("txt_observaciones").value = obs;
    }

    function guardar() {
        if(!workbook_data) { alert("Debe crear o abrir un archivo primero."); return; }
        let nom = document.getElementById("nombre").value.trim();
        if(!nom){ alert("El Nombre del Equipo no puede guardarse vacío."); return; }

        let sheetName = workbook_data.SheetNames[1] ? workbook_data.SheetNames[1] : workbook_data.SheetNames[0];
        let hoja = workbook_data.Sheets[sheetName];
        let target_gab = document.getElementById("cb_gabinete").value;

        let fila_insercion = null;
        let encontrado_contexto = false;

        for(let fila = 13; fila <= 600; fila++) {
            let val_b = obtener_celda(hoja, fila, 2);
            let val_b_str = String(val_b).toUpperCase().replace(/\s+/g, ' ').trim();

            let norm_gab = "";
            if(val_b_str.includes("GABINETE") || val_b_str.includes("RACK")) {
                let num = val_b_str.match(/\d+/);
                norm_gab = num ? `GABINETE #${parseInt(num[0])}` : val_b_str;
            }

            if(norm_gab === target_gab) {
                encontrado_contexto = true;
                continue;
            }
            if(encontrado_contexto) {
                if(val_b_str.includes("GABINETE") || val_b_str.includes("RACK")) { 
                    fila_insercion = fila - 1; 
                    break; 
                }
                if(!val_b || String(val_b).trim() === "") {
                    fila_insercion = fila;
                    break;
                }
            }
        }

        if(!fila_insercion) {
            for(let f = 13; f <= 1000; f++){
                let b = obtener_celda(hoja, f, 2);
                if(!b || b === ""){
                    asignar_celda(hoja, f, 2, target_gab);
                    fila_insercion = f + 1;
                    break;
                }
            }
        }

        asignar_celda(hoja, fila_insercion, 2, nom);
        asignar_celda(hoja, fila_insercion, 3, document.getElementById("marca").value.trim());
        asignar_celda(hoja, fila_insercion, 4, document.getElementById("modelo").value.trim());
        asignar_celda(hoja, fila_insercion, 5, document.getElementById("ru_val").value.trim()); 
        asignar_celda(hoja, fila_insercion, 6, document.getElementById("serie").value.trim());    

        let col_turno = mapa_columnas_horario[document.getElementById("cb_horario").value] || 7;
        asignar_celda(hoja, fila_insercion, col_turno, document.getElementById("medicion_individual").value.trim());
        asignar_celda(hoja, fila_insercion, 11, document.getElementById("cb_estado").value);
        asignar_celda(hoja, fila_insercion, col_observaciones, document.getElementById("txt_observaciones").value.trim());

        alert(`Equipo guardado exitosamente dentro del ${target_gab}.`);
        limpiar_campos();
        mostrar_por_gabinete();
    }

    function modificar() {
        if(!workbook_data || fila_seleccionada_idx === null) { alert("Por favor haga clic sobre una fila del Treeview."); return; }

        let sheetName = workbook_data.SheetNames[1] ? workbook_data.SheetNames[1] : workbook_data.SheetNames[0];
        let hoja = workbook_data.Sheets[sheetName];

        asignar_celda(hoja, fila_seleccionada_idx, 2, document.getElementById("nombre").value.trim());
        asignar_celda(hoja, fila_seleccionada_idx, 3, document.getElementById("marca").value.trim());
        asignar_celda(hoja, fila_seleccionada_idx, 4, document.getElementById("modelo").value.trim());
        asignar_celda(hoja, fila_seleccionada_idx, 5, document.getElementById("ru_val").value.trim());
        asignar_celda(hoja, fila_seleccionada_idx, 6, document.getElementById("serie").value.trim());

        let col_turno = mapa_columnas_horario[document.getElementById("cb_horario").value] || 7;
        asignar_celda(hoja, fila_seleccionada_idx, col_turno, document.getElementById("medicion_individual").value.trim());
        asignar_celda(hoja, fila_seleccionada_idx, 11, document.getElementById("cb_estado").value);
        asignar_celda(hoja, fila_seleccionada_idx, col_observaciones, document.getElementById("txt_observaciones").value.trim());

        alert("Fila modificada correctamente.");
        limpiar_campos();
        mostrar_por_gabinete();
    }

    function confirmar_estatus() { if(fila_seleccionada_idx !== null) modificar(); }

    function limpiar_registro() {
        if(!workbook_data || fila_seleccionada_idx === null) return;
        let menu = prompt("Escriba 'SI' para borrar solo el turno activo.\nEscriba 'NO' para borrar el equipo completo.");
        if(!menu) return;

        let sheetName = workbook_data.SheetNames[1] ? workbook_data.SheetNames[1] : workbook_data.SheetNames[0];
        let hoja = workbook_data.Sheets[sheetName];

        if(menu.toUpperCase().trim() === "SI") {
            let col_turno = mapa_columnas_horario[document.getElementById("cb_horario").value] || 7;
            asignar_celda(hoja, fila_seleccionada_idx, col_turno, "");
        } else if(menu.toUpperCase().trim() === "NO") {
            if(!confirm("¿Remover el renglón completo del equipo?")) return;
            for(let col = 2; col <= col_observaciones; col++) asignar_celda(hoja, fila_seleccionada_idx, col, "");
        }
        limpiar_campos();
        mostrar_por_gabinete();
    }

    function limpiar_campos() {
        document.getElementById("nombre").value = "";
        document.getElementById("marca").value = "";
        document.getElementById("modelo").value = "";
        document.getElementById("ru_val").value = "";
        document.getElementById("serie").value = "";
        document.getElementById("medicion_individual").value = "";
        document.getElementById("txt_observaciones").value = "";
        document.getElementById("cb_gabinete").value = "GABINETE #1";
        document.getElementById("cb_estado").value = "Óptimo";
    }
</script>
</body>
</html>
