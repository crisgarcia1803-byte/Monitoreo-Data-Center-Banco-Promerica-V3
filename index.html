<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitoreo Data Center BP</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #098E09;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        #app-window {
            width: 1280px;
            height: 790px;
            position: relative;
            margin: 0 auto;
            background-color: #098E09;
        }

        .title-label {
            width: 100%;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            padding-top: 5px;
            margin: 0;
        }

        .frame-cabecera {
            position: absolute;
            left: 10px;
            top: 45px;
            width: 1260px;
            height: 65px;
            background-color: #065F06;
            border: 2px ridge #b0b0b0;
            box-sizing: border-box;
        }

        .frame-cabecera label {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
        }

        .frame-cabecera input, .frame-cabecera select {
            position: absolute;
            font-family: Arial, sans-serif;
            font-size: 12px;
            box-sizing: border-box;
        }

        .form-label {
            position: absolute;
            font-size: 13px;
            font-weight: bold;
        }

        .form-input, .form-select {
            position: absolute;
            font-family: Arial, sans-serif;
            font-size: 13px;
            box-sizing: border-box;
        }

        .btn {
            position: absolute;
            background-color: #ADFF2F;
            color: black;
            border: 1px solid #7a7a7a;
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .btn:active { background-color: #96db29; }
        .btn-danger { background-color: #FF6B6B; color: white; }

        .frame-tree {
            position: absolute;
            left: 10px;
            top: 285px;
            width: 1260px;
            height: 480px;
            background-color: white;
            border: 1px solid #B0B0B0;
            overflow: auto;
        }

        .excel-table {
            border-collapse: collapse;
            width: 100%;
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #1a1a1a;
        }

        .excel-table th {
            background-color: #D9E1F2;
            color: #1F2D3D;
            font-weight: bold;
            border: 1px solid #B0B0B0;
            padding: 6px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .excel-table td {
            border: 1px solid #B0B0B0;
            padding: 5px;
            white-space: nowrap;
        }

        .excel-table tr.optimo { background-color: #E2EFDA; color: #1a5c1a; }
        .excel-table tr.alertado { background-color: #FFF2CC; color: #7d5c00; }
        .excel-table tr.fallo { background-color: #FCE4D6; color: #8b0000; }
        .excel-table tr.selected { background-color: #CCE5FF !important; }
    </style>
</head>
<body>

<div id="app-window">
    <p class="title-label">Monitoreo Data Center BP</p>

    <div class="frame-cabecera">
        <label style="left: 10px; top: 5px;">Fecha:</label>
        <input type="text" id="txt_fecha" style="left: 10px; top: 28px; width: 90px;">

        <label style="left: 115px; top: 5px;">Operador / Responsable:</label>
        <input type="text" id="operador" style="left: 115px; top: 28px; width: 155px;">

        <label style="left: 285px; top: 5px;">Horario Chequeo:</label>
        <select id="cb_horario" style="left: 285px; top: 28px; width: 110px;">
            <option value="4:00 a. m.">4:00 a. m.</option>
            <option value="10:00 a. m.">10:00 a. m.</option>
            <option value="17:00 p. m.">17:00 p. m.</option>
            <option value="22:00 p. m.">22:00 p. m.</option>
        </select>
    </div>

    <label class="form-label" style="left: 10px; top: 120px;">Gabinete</label>
    <select id="cb_gabinete" class="form-select" style="left: 10px; top: 143px; width: 120px;"></select>

    <label class="form-label" style="left: 145px; top: 120px;">Nombre Equipo</label>
    <input type="text" id="nombre" class="form-input" style="left: 145px; top: 143px; width: 110px;">

    <label class="form-label" style="left: 265px; top: 120px;">Marca</label>
    <input type="text" id="marca" class="form-input" style="left: 265px; top: 143px; width: 85px;">

    <label class="form-label" style="left: 365px; top: 120px;">Modelo</label>
    <input type="text" id="modelo" class="form-input" style="left: 365px; top: 143px; width: 90px;">

    <label class="form-label" style="left: 470px; top: 120px;">RU#</label>
    <input type="text" id="ru" class="form-input" style="left: 470px; top: 143px; width: 50px;">

    <label class="form-label" style="left: 530px; top: 120px;">Serie</label>
    <input type="text" id="serie" class="form-input" style="left: 530px; top: 143px; width: 115px;">

    <label class="form-label" style="left: 655px; top: 120px;">Estatus</label>
    <select id="cb_estado" class="form-select" style="left: 655px; top: 143px; width: 90px;">
        <option value="Óptimo">Óptimo</option>
        <option value="Alertado">Alertado</option>
        <option value="Fallo">Fallo</option>
    </select>

    <label class="form-label" style="left: 760px; top: 120px; color: #ADFF2F;">Medición Turno</label>
    <input type="text" id="medicion_individual" class="form-input" style="left: 760px; top: 143px; width: 115px;">

    <label class="form-label" style="left: 890px; top: 120px;">Observaciones</label>
    <input type="text" id="txt_observaciones" class="form-input" style="left: 890px; top: 143px; width: 140px;">

    <label id="er" style="position: absolute; left: 10px; top: 218px; font-size: 14px; font-style: italic; color: #ADFF2F;">Excel activo: Ninguno</label>
    <input type="file" id="file_picker" accept=".xlsx" style="display:none" onchange="cargar_archivo(event)">

    <button class="btn" style="left: 10px;  top: 248px; width: 140px; height: 26px;" onclick="document.getElementById('file_picker').click()">Cargar Excel Real</button>
    <button class="btn" style="left: 160px; top: 248px; width: 140px; height: 26px;" onclick="modificar()">Guardar Cambios</button>

    <div class="frame-tree">
        <table class="excel-table">
            <thead>
                <tr>
                    <th>Gabinete</th>
                    <th>Nombre Equipo</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>RU#</th>
                    <th>Serie</th>
                    <th>4:00 a. m.</th>
                    <th>10:00 a. m.</th>
                    <th>17:00 p. m.</th>
                    <th>22:00 p. m.</th>
                    <th>Estado</th>
                    <th>Observaciones</th>
                </tr>
            </thead>
            <tbody id="tree_body"></tbody>
        </table>
    </div>
</div>

<script>
    let workbook_data = null;
    let current_file = null;
    let fila_seleccionada_idx = null;

    // Mapeo exacto basado en la captura del Excel real
    const COL_GABINETE = 1;      // A (Asumido o autocompletado si está vacío)
    const COL_NOMBRE = 2;        // B
    const COL_MARCA = 3;         // C
    const COL_MODELO = 4;        // D
    const COL_RU = 5;            // E
    const COL_SERIE = 6;         // F
    const COL_4AM = 7;           // G
    const COL_10AM = 8;          // H
    const COL_17PM = 9;          // I
    const COL_22PM = 10;         // J
    const COL_ESTADO = 11;       // K
    const COL_OBSERVACIONES = 12;// L

    window.onload = function() {
        const cb = document.getElementById("cb_gabinete");
        for(let i=1; i<=16; i++) {
            let o = document.createElement("option");
            o.value = `GABINETE #${i}`; o.textContent = `Gabinete #${i}`;
            cb.appendChild(o);
        }
        let hoy = new Date();
        document.getElementById("txt_fecha").value = `${String(hoy.getDate()).padStart(2,'0')}/${String(hoy.getMonth()+1).padStart(2,'0')}/${hoy.getFullYear()}`;
    };

    function cargar_archivo(e) {
        let file = e.target.files[0];
        if (!file) return;
        current_file = file;
        let reader = new FileReader();
        reader.onload = function(evt) {
            try {
                let data = new Uint8Array(evt.target.result);
                workbook_data = XLSX.read(data, {type: 'array'});
                document.getElementById("er").textContent = `Excel activo: ${file.name}`;
                renderizar_tabla();
            } catch(err) { alert("Error al leer Excel: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
    }

    function cell_val(ws, r, c) {
        let ref = XLSX.utils.encode_cell({r: r-1, c: c-1});
        return ws[ref] ? ws[ref].v : "";
    }

    function set_cell(ws, r, c, val) {
        let ref = XLSX.utils.encode_cell({r: r-1, c: c-1});
        ws[ref] = { t: 's', v: String(val) };
    }

    function renderizar_tabla() {
        if(!workbook_data) return;
        const tbody = document.getElementById("tree_body");
        tbody.innerHTML = "";
        
        let hoja = workbook_data.Sheets[workbook_data.SheetNames[0]];
        let total = 0;

        // Escaneamos un rango amplio (desde fila 13 hasta 250) basándonos en tu formato
        for(let f = 13; f <= 250; f++) {
            let nom = cell_val(hoja, f, COL_NOMBRE);
            
            // Si hay un nombre válido y no es una celda vacía o de diseño
            if(nom && String(nom).trim() !== "" && String(nom).toUpperCase() !== "NOMBRE") {
                let gab = cell_val(hoja, f, COL_GABINETE) || "GABINETE #1";
                let mar = cell_val(hoja, f, COL_MARCA);
                let mod = cell_val(hoja, f, COL_MODELO);
                let ru_val = cell_val(hoja, f, COL_RU);
                let ser = cell_val(hoja, f, COL_SERIE);
                let h4 = cell_val(hoja, f, COL_4AM);
                let h10 = cell_val(hoja, f, COL_10AM);
                let h17 = cell_val(hoja, f, COL_17PM);
                let h22 = cell_val(hoja, f, COL_22PM);
                let est = cell_val(hoja, f, COL_ESTADO) || "Óptimo";
                let obs = cell_val(hoja, f, COL_OBSERVACIONES);

                let tr = document.createElement("tr");
                let cls = "optimo";
                if(String(est).toLowerCase().includes("fallo")) cls = "fallo";
                if(String(est).toLowerCase().includes("alert")) cls = "alertado";
                tr.className = cls;

                tr.innerHTML = `
                    <td>${gab}</td>
                    <td><b>${nom}</b></td>
                    <td>${mar}</td>
                    <td>${mod}</td>
                    <td>${ru_val}</td>
                    <td>${ser}</td>
                    <td>${h4}</td>
                    <td>${h10}</td>
                    <td>${h17}</td>
                    <td>${h22}</td>
                    <td>${est}</td>
                    <td>${obs}</td>
                `;

                tr.onclick = function() {
                    let rows = tbody.getElementsByTagName("tr");
                    for(let r of rows) r.classList.remove("selected");
                    tr.classList.add("selected");
                    fila_seleccionada_idx = f;
                    
                    // Cargar datos a los inputs superiores
                    document.getElementById("cb_gabinete").value = gab.toUpperCase().includes("GABINETE") ? gab : "GABINETE #1";
                    document.getElementById("nombre").value = nom;
                    document.getElementById("marca").value = mar;
                    document.getElementById("modelo").value = mod;
                    document.getElementById("ru").value = ru_val;
                    document.getElementById("serie").value = ser;
                    document.getElementById("cb_estado").value = est;
                    document.getElementById("txt_observaciones").value = obs;

                    // Mostrar la medición según el turno activo seleccionado en el combo
                    let turno = document.getElementById("cb_horario").value;
                    if(turno === "4:00 a. m.") document.getElementById("medicion_individual").value = h4;
                    if(turno === "10:00 a. m.") document.getElementById("medicion_individual").value = h10;
                    if(turno === "17:00 p. m.") document.getElementById("medicion_individual").value = h17;
                    if(turno === "22:00 p. m.") document.getElementById("medicion_individual").value = h22;
                };

                tbody.appendChild(tr);
                total++;
            }
        }
    }

    function modificar() {
        if(!workbook_data || fila_seleccionada_idx === null) {
            alert("Selecciona primero una fila de la lista haciendo clic en ella.");
            return;
        }
        let hoja = workbook_data.Sheets[workbook_data.SheetNames[0]];

        // Guardar valores modificados de las cajas de texto al mapa de Excel
        set_cell(hoja, fila_seleccionada_idx, COL_GABINETE, document.getElementById("cb_gabinete").value);
        set_cell(hoja, fila_seleccionada_idx, COL_NOMBRE, document.getElementById("nombre").value);
        set_cell(hoja, fila_seleccionada_idx, COL_MARCA, document.getElementById("marca").value);
        set_cell(hoja, fila_seleccionada_idx, COL_MODELO, document.getElementById("modelo").value);
        set_cell(hoja, fila_seleccionada_idx, COL_RU, document.getElementById("ru").value);
        set_cell(hoja, fila_seleccionada_idx, COL_SERIE, document.getElementById("serie").value);
        set_cell(hoja, fila_seleccionada_idx, COL_ESTADO, document.getElementById("cb_estado").value);
        set_cell(hoja, fila_seleccionada_idx, COL_OBSERVACIONES, document.getElementById("txt_observaciones").value);

        // Guardar medición en el turno correspondiente
        let turno = document.getElementById("cb_horario").value;
        let med = document.getElementById("medicion_individual").value;
        if(turno === "4:00 a. m.") set_cell(hoja, fila_seleccionada_idx, COL_4AM, med);
        if(turno === "10:00 a. m.") set_cell(hoja, fila_seleccionada_idx, COL_10AM, med);
        if(turno === "17:00 p. m.") set_cell(hoja, fila_seleccionada_idx, COL_17PM, med);
        if(turno === "22:00 p. m.") set_cell(hoja, fila_seleccionada_idx, COL_22PM, med);

        alert("Registro actualizado en la memoria interna.");
        renderizar_tabla();
        
        // Descarga automática del archivo actualizado
        XLSX.writeFile(workbook_data, current_file ? current_file.name : "Monitoreo_Actualizado.xlsx");
    }
</script>
</body>
</html>
