<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitoreo Data Center BP - Login</title>
    
    <link rel="icon" type="image/png" href="https://play-lh.googleusercontent.com/XKLrbobj8GFv259lte7hSWc9BleH7Mjs67IKBefRU0GTDLiFyT0zJ4WBuz6TNqQuoU6P">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <style>
        /* Documentación interna
           Autor: Cristopher Gerardo García Escoto (cris.garcia1803@gmail.com)
           Proyecto: Practicante - Banco Promerica 
           Lenguaje base: Python
           Lenguaje para página: HTML, JavaScript, CSS
           Fin en mente: Facilitar el monitoreo de los servidores del data center
           Historia: 27/05/2026 - 28/05/2026 - 29/05/2026 - 01/06/2026 - 02/06/2026 - 03/06/2026 - 04/06/2026 - 05/06/2026
           */

        body {
            margin: 0;
            padding: 20px;
            background-color: #00693c; /* NUEVO: Color de fondo principal */
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden; 
        }

        /* --- ESTILOS DE LA PANTALLA DE LOGIN --- */
        #login-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #004d2c; /* NUEVO: Fondo oscuro del login */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-box {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: black;
            width: 320px;
            text-align: center;
        }

        .login-box h2 {
            margin-top: 0;
            color: #00693c; /* NUEVO: Título del login */
            font-size: 20px;
            margin-bottom: 20px;
        }

        .login-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            margin-bottom: 15px;
        }

        .login-group label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .login-box input {
            width: 100%;
            height: 35px;
            padding: 6px;
            font-size: 14px;
        }

        .btn-login {
            width: 100%;
            background-color: #79bf42; /* NUEVO: Botón de login */
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover {
            background-color: #639e35;
        }

        .error-login {
            color: red;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        /* --- ESTILOS DEL CONTENIDO PRINCIPAL --- */
        #main-content {
            display: none; 
            position: relative; 
        }

        /* Contenedor de la cabecera con el título y la imagen en la esquina */
        .cabecera-principal {
            position: relative;
            margin-bottom: 25px;
            padding-right: 120px; 
            min-height: 50px;
        }

        .logo-esquina {
            position: absolute;
            top: 0;
            right: 0;
            max-width: 110px;
            max-height: 50px;
            object-fit: contain;
            border-radius: 4px;
        }

        .fila-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            align-items: flex-end;
        }

        .flex-group {
            display: flex;
            flex-direction: column;
        }

        .flex-group label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
        }

        .flex-group label.highlight {
            color: #79bf42; /* NUEVO: Color para las etiquetas resaltadas */
        }

        input, select {
            font-size: 13px;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid #ccc;
            color: black;
            box-sizing: border-box;
            height: 28px;
        }

        .acciones-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 6px 16px;
            background-color: #79bf42; /* NUEVO: Color de los botones principales */
            color: white; /* Cambiado a blanco para mejor contraste en fondo verde */
            border: 1px solid #5a9130;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            height: 32px;
        }
        .btn:hover {
            background-color: #639e35;
        }
        .btn-danger {
            background-color: #FF6B6B;
            color: white;
            border: 1px solid #d45959;
        }
        .btn-danger:hover {
            background-color: #e05353;
        }

        .barra-filtrado {
            background-color: #004d2c; /* NUEVO: Fondo de la barra de filtrado */
            padding: 8px;
            border: 1px solid #79bf42; /* NUEVO: Borde de la barra */
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 4px;
        }
        .barra-filtrado label {
            font-size: 13px;
            font-weight: bold;
            color: white;
        }

        .status-label {
            font-size: 13px;
            font-style: italic;
            color: #79bf42; /* NUEVO: Texto de estado del archivo */
            margin-bottom: 10px;
            display: block;
        }

        .frame-tree {
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            max-height: 450px;
            overflow-y: auto;  
            overflow-x: hidden; 
            width: 100%;
            box-sizing: border-box;
        }

        .excel-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 11px; 
            color: black;
            table-layout: fixed; 
        }

        .excel-table th {
            background-color: #b4c6e7;
            color: black;
            font-weight: bold;
            border: 1px solid #7a7a7a;
            padding: 5px 2px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .excel-table td {
            border: 1px solid #7a7a7a;
            padding: 4px 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
        }

        .col-gab    { width: 9%; }
        .col-nom    { width: 15%; }
        .col-mar    { width: 7%; }
        .col-mod    { width: 9%; }
        .col-ru     { width: 4%; }
        .col-ser    { width: 11%; }
        .col-h04    { width: 7%; }
        .col-h10    { width: 7%; }
        .col-h16    { width: 7%; }
        .col-h22    { width: 7%; }
        .col-est    { width: 7%; }
        .col-obs    { width: 11%; }

        .excel-table tr.optimo { background-color: #e2efda; }
        .excel-table tr.alertado { background-color: #fff2cc; }
        .excel-table tr.fallo { background-color: #fce4d6; }
        
        .excel-table tr.selected {
            background-color: #cce5ff !important;
        }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2>Banco Promerica - Acceso</h2>
            <div class="login-group">
                <label>Usuario:</label>
                <input type="text" id="login_user" placeholder="Ej: admin">
            </div>
            <div class="login-group">
                <label>Contraseña:</label>
                <input type="password" id="login_pass" placeholder="••••••••">
            </div>
            <button class="btn-login" onclick="autenticar()">Ingresar</button>
            <div id="error_msg" class="error-login">Usuario o contraseña incorrectos.</div>
        </div>
    </div>

    <div id="main-content">

        <div class="cabecera-principal">
            <div>
                <h1 style="font-size: 24px; font-weight: bold; margin: 0; display: inline-block; vertical-align: middle;">Monitoreo Data Center BP</h1>
                <button class="btn btn-danger" onclick="cerrar_sesion()" style="height:28px; padding:2px 10px; margin-left: 15px; vertical-align: middle;">Cerrar Sesión</button>
            </div>
            <img src="https://play-lh.googleusercontent.com/XKLrbobj8GFv259lte7hSWc9BleH7Mjs67IKBefRU0GTDLiFyT0zJ4WBuz6TNqQuoU6P" alt="Logo Corporativo" class="logo-esquina">
        </div>

        <div class="fila-inputs">
            <div class="flex-group">
                <label>Fecha:</label>
                <input type="text" id="txt_fecha" style="width: 100px;">
            </div>
            <div class="flex-group">
                <label>Horario Chequeo:</label>
                <select id="cb_horario" onchange="cargar_datos_cabecera_turno()" style="width: 110px;">
                    <option value=""></option> 
                    <option value="04:00 AM">04:00 AM</option>
                    <option value="10:00 AM">10:00 AM</option>
                    <option value="16:00 PM">16:00 PM</option>
                    <option value="22:00 PM">22:00 PM</option>
                </select>
            </div>
            <div class="flex-group">
                <label>Operador / Responsable:</label>
                <input type="text" id="operador" style="width: 160px;">
            </div>
            <div class="flex-group">
                <label class="highlight">ISP:</label>
                <input type="text" id="input_isp" style="width: 80px;">
            </div>
            <div class="flex-group">
                <label class="highlight">UPS (°C):</label>
                <input type="text" id="input_ups" style="width: 80px;">
            </div>
            <div class="flex-group">
                <label class="highlight">Servidores (°F):</label>
                <input type="text" id="input_servidores" style="width: 90px;">
            </div>
            <div class="flex-group">
                <label class="highlight">AC (%RH):</label>
                <input type="text" id="input_ac" style="width: 80px;">
            </div>
            <div class="flex-group">
                <label class="highlight">PEX A:</label>
                <input type="text" id="input_pexa" style="width: 80px;">
            </div>
            <div class="flex-group">
                <label class="highlight">PEX B:</label>
                <input type="text" id="input_pexb" style="width: 80px;">
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #79bf42; margin: 15px 0;">

        <div class="fila-inputs">
            <div class="flex-group">
                <label>Gabinete</label>
                <select id="cb_gabinete" style="width: 130px;">
                    <option value=""></option> 
                </select>
            </div>
            <div class="flex-group">
                <label>Nombre Equipo</label>
                <input type="text" id="nombre" style="width: 150px;">
            </div>
            <div class="flex-group">
                <label>Marca</label>
                <input type="text" id="marca" style="width: 100px;">
            </div>
            <div class="flex-group">
                <label>Modelo</label>
                <input type="text" id="modelo" style="width: 130px;">
            </div>
            <div class="flex-group">
                <label>RU#</label>
                <input type="text" id="ru_val" style="width: 55px;">
            </div>
            <div class="flex-group">
                <label>Serie</label>
                <input type="text" id="serie" style="width: 140px;">
            </div>
            <div class="flex-group">
                <label>Estatus</label>
                <select id="cb_estado" style="width: 100px;">
                    <option value=""></option> 
                    <option value="Óptimo">Óptimo</option>
                    <option value="Alertado">Alertado</option>
                    <option value="Fallo">Fallo</option>
                </select>
            </div>
            <div class="flex-group">
                <label class="highlight">Medición Turno</label>
                <input type="text" id="medicion_individual" style="width: 110px;">
            </div>
            <div class="flex-group">
                <label>Observaciones</label>
                <input type="text" id="txt_observaciones" style="width: 180px;">
            </div>
        </div>

        <span id="er" class="status-label">Excel activo: Ninguno</span>

        <div class="acciones-container">
            <button class="btn" onclick="abrir_excel_nativo()">Abrir</button>
            <button class="btn" onclick="guardar()">Guardar Registro</button>
            <button class="btn" onclick="modificar()">Modificar Celda</button>
            <button class="btn btn-danger" onclick="limpiar_registro()">Limpiar Registro</button>
        </div>

        <div class="barra-filtrado">
            <label>FILTRAR VISTA POR GABINETE:</label>
            <select id="cb_filtro_gabinete" onchange="mostrar_por_gabinete()" style="width: 180px;">
                <option value="TODOS">-- Ver Todo el Excel --</option>
            </select>
        </div>

        <div class="frame-tree">
            <table class="excel-table">
                <thead>
                    <tr>
                        <th class="col-gab">Gabinete</th>
                        <th class="col-nom">Nombre Equipo</th>
                        <th class="col-mar">Marca</th>
                        <th class="col-mod">Modelo</th>
                        <th class="col-ru">RU#</th>
                        <th class="col-ser">Serie</th>
                        <th class="col-h04">04:00 am</th>
                        <th class="col-h10">10:00 am</th>
                        <th class="col-h16">16:00 pm</th>
                        <th class="col-h22">22:00 pm</th>
                        <th class="col-est">Estado</th>
                        <th class="col-obs">Observaciones</th>
                    </tr>
                </thead>
                <tbody id="tree_body"></tbody>
            </table>
        </div>
    </div>

<script>
    const USUARIO_VALIDO = "admin";
    const CLAVE_VALIDA = "promerica2026";

    let fileHandle = null;
    let currentWorkbook = null; 
    let fila_seleccionada_idx = null;

    const mapa_columnas_horario = {"04:00 AM": 7, "10:00 AM": 8, "16:00 PM": 9, "22:00 PM": 10};
    const mapa_filas_cabecera_turno = {"04:00 AM": 6, "10:00 AM": 7, "16:00 PM": 8, "22:00 PM": 9};
    const col_observaciones = 12;

    function autenticar() {
        const u = document.getElementById("login_user").value.trim();
        const p = document.getElementById("login_pass").value;
        const err = document.getElementById("error_msg");

        if(u === USUARIO_VALIDO && p === CLAVE_VALIDA) {
            document.getElementById("login-container").style.display = "none";
            document.getElementById("main-content").style.display = "block";
            err.style.display = "none";
        } else {
            err.style.display = "block";
        }
    }

    function cerrar_sesion() {
        document.getElementById("login_user").value = "";
        document.getElementById("login_pass").value = "";
        document.getElementById("login-container").style.display = "flex";
        document.getElementById("main-content").style.display = "none";
    }

    document.getElementById("login_pass").addEventListener("keypress", function(e) {
        if (e.key === "Enter") autenticar();
    });

    window.onload = function() {
        const cb_gabinete = document.getElementById("cb_gabinete");
        const cb_filtro = document.getElementById("cb_filtro_gabinete");
        
        for(let i=1; i<=16; i++) {
            let gabText = `GABINETE #${i}`;
            let opt1 = document.createElement("option"); opt1.value = gabText; opt1.textContent = gabText;
            cb_gabinete.appendChild(opt1);

            let opt2 = document.createElement("option"); opt2.value = gabText; opt2.textContent = gabText;
            cb_filtro.appendChild(opt2);
        }
        
        cb_gabinete.value = "";
        cb_filtro.value = "TODOS";
        document.getElementById("cb_horario").value = "";
        document.getElementById("cb_estado").value = "";
        document.getElementById("txt_fecha").value = "";
    };

    async function abrir_excel_nativo() {
        try {
            const [handle] = await window.showOpenFilePicker({
                types: [{
                    description: 'Archivos de Excel',
                    accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
                }],
                multiple: false
            });
            
            fileHandle = handle;
            const file = await fileHandle.getFile();
            
            let reader = new FileReader();
            reader.onload = async function(evt) {
                try {
                    const workbook = new ExcelJS.Workbook();
                    const buffer = evt.target.result;
                    currentWorkbook = await workbook.xlsx.load(buffer);
                    
                    document.getElementById("er").textContent = `Excel activo (Con Formato): ${file.name}`;
                    mostrar_por_gabinete();
                    cargar_datos_cabecera_turno();
                } catch(err) {
                    alert("Error analizando los estilos del Excel corporativo.");
                }
            };
            reader.readAsArrayBuffer(file);
        } catch (err) {
            console.log("Selección cancelada.", err);
        }
    }

    async function actualizar_archivo_excel_fisico() {
        if (!currentWorkbook || !fileHandle) return;
        try {
            const buffer = await currentWorkbook.xlsx.writeBuffer();
            const writable = await fileHandle.createWritable();
            await writable.write(buffer);
            await writable.close();
        } catch (err) {
            alert("Error al guardar: Asegúrate de cerrar el archivo en Microsoft Excel antes de guardar.");
        }
    }

    function _fila_es_encabezado(valor) {
        if (!valor) return false; 
        let s = String(valor).toUpperCase().trim();
        return s === "NOMBRE" || s === "MARCA" || s === "MODELO" || s.includes("HORA VERIFICACION") || s.includes("DATA CENTER") || s.includes("FECHA:");
    }

    function _tag_estado(estado) {
        let e = !estado ? "" : String(estado).toLowerCase().trim();
        if(e.includes("fallo")) return "fallo";
        if(e.includes("alert")) return "alertado";
        return "optimo";
    }

    function obtener_celda(hoja, r, c) {
        const cell = hoja.getCell(r, c);
        return cell.value !== null && cell.value !== undefined ? cell.value.toString() : "";
    }

    function asignar_celda(hoja, r, c, val) {
        hoja.getCell(r, c).value = val;
    }

    function cargar_datos_cabecera_turno() {
        if(!currentWorkbook) return;
        let turnoActivo = document.getElementById("cb_horario").value;
        if(!turnoActivo) return; 
        
        let hoja = currentWorkbook.worksheets[0];
        let filaCabecera = mapa_filas_cabecera_turno[turnoActivo];

        document.getElementById("operador").value = obtener_celda(hoja, filaCabecera, 3);   
        document.getElementById("input_isp").value = obtener_celda(hoja, filaCabecera, 6);   
        document.getElementById("input_ups").value = obtener_celda(hoja, filaCabecera, 8);   
        document.getElementById("input_servidores").value = obtener_celda(hoja, filaCabecera, 10); 
        document.getElementById("input_ac").value = obtener_celda(hoja, filaCabecera, 12);   
        document.getElementById("input_pexa").value = obtener_celda(hoja, filaCabecera, 13); 
        document.getElementById("input_pexb").value = obtener_celda(hoja, filaCabecera + 1, 13); 
        
        let fechaExcel = obtener_celda(hoja, 4, 3);
        if(fechaExcel) document.getElementById("txt_fecha").value = fechaExcel;
    }

    function interstate_guardar_cabecera(hoja) {
        let turnoActivo = document.getElementById("cb_horario").value;
        if(!turnoActivo) return;

        let filaCabecera = mapa_filas_cabecera_turno[turnoActivo];

        asignar_celda(hoja, filaCabecera, 3, document.getElementById("operador").value.trim());       
        asignar_celda(hoja, filaCabecera, 6, document.getElementById("input_isp").value.trim());       
        asignar_celda(hoja, filaCabecera, 8, document.getElementById("input_ups").value.trim());       
        asignar_celda(hoja, filaCabecera, 10, document.getElementById("input_servidores").value.trim()); 
        asignar_celda(hoja, filaCabecera, 12, document.getElementById("input_ac").value.trim());       
        asignar_celda(hoja, filaCabecera, 13, document.getElementById("input_pexa").value.trim());     
        
        asignar_celda(hoja, 4, 3, document.getElementById("txt_fecha").value.trim());
    }

    function mostrar_por_gabinete() {
        if(!currentWorkbook) return;
        const tbody = document.getElementById("tree_body");
        tbody.innerHTML = "";
        fila_seleccionada_idx = null;

        let hoja = currentWorkbook.worksheets[0];
        let filtro = document.getElementById("cb_filtro_gabinete").value;

        let gabinete_actual_contexto = "GABINETE #1"; 

        for(let fila = 13; fila <= 600; fila++) {
            let celda_b = obtener_celda(hoja, fila, 2);
            let celda_b_str = String(celda_b).toUpperCase().replace(/\s+/g, ' ').trim();

            if(celda_b_str.includes("GABINETE") || celda_b_str.includes("RACK")) {
                let num = celda_b_str.match(/\d+/);
                gabinete_actual_contexto = num ? `GABINETE #${parseInt(num[0])}` : celda_b_str;
                continue;
            }

            if(!_fila_es_encabezado(celda_b)) {
                if(filtro !== "TODOS" && gabinete_actual_contexto !== filtro) continue;

                let mar = obtener_celda(hoja, fila, 3);
                let mod = obtener_celda(hoja, fila, 4);
                let ru  = obtener_celda(hoja, fila, 5);
                let ser = obtener_celda(hoja, fila, 6);
                
                let h04 = obtener_celda(hoja, fila, 7);
                let h10 = obtener_celda(hoja, fila, 8);
                let h16 = obtener_celda(hoja, fila, 9);
                let h22 = obtener_celda(hoja, fila, 10);
                
                let est = obtener_celda(hoja, fila, 11) || "Óptimo";
                let obs = obtener_celda(hoja, fila, col_observaciones);

                let tr = document.createElement("tr");
                tr.className = _tag_estado(est);
                tr.dataset.filaExcel = fila;
                
                tr.innerHTML = `
                    <td style="text-align:center; font-weight:bold;">${gabinete_actual_contexto}</td>
                    <td title="${celda_b}">${celda_b}</td>
                    <td style="text-align:center;" title="${mar}">${mar}</td>
                    <td style="text-align:center;" title="${mod}">${mod}</td>
                    <td style="text-align:center;">${ru}</td>
                    <td style="text-align:center;" title="${ser}">${ser}</td>
                    <td style="text-align:center;">${h04}</td>
                    <td style="text-align:center;">${h10}</td>
                    <td style="text-align:center;">${h16}</td>
                    <td style="text-align:center;">${h22}</td>
                    <td style="text-align:center;">${est}</td>
                    <td title="${obs}">${obs}</td>
                `;
                
                tr.onclick = function() {
                    let rows = tbody.getElementsByTagName("tr");
                    for(let r of rows) r.classList.remove("selected");
                    tr.classList.add("selected");
                    fila_seleccionada_idx = fila;
                    cargar_seleccion(gabinete_actual_contexto, celda_b, mar, mod, ru, ser, h04, h10, h16, h22, est, obs);
                };
                tbody.appendChild(tr);
            }
        }
    }

    function cargar_seleccion(gab, nom, mar, mod, ru, ser, h04, h10, h16, h22, est, obs) {
        const cb_gab = document.getElementById("cb_gabinete");
        const opcionExiste = cb_gab.querySelector(`option[value="${gab}"]`);
        if(opcionExiste) {
            cb_gab.value = gab;
        } else {
            cb_gab.value = "";
        }

        document.getElementById("nombre").value = nom;
        document.getElementById("marca").value = mar;
        document.getElementById("modelo").value = mod;
        document.getElementById("ru_val").value = ru; 
        document.getElementById("serie").value = ser; 

        let turno = document.getElementById("cb_horario").value;
        let med = "";
        if(turno) {
            med = (turno === "04:00 AM") ? h04 : (turno === "10:00 AM") ? h10 : (turno === "16:00 PM") ? h16 : h22;
        }

        document.getElementById("medicion_individual").value = med;
        document.getElementById("cb_estado").value = est;
        document.getElementById("txt_observaciones").value = obs;
    }

    async function guardar() {
        if(!currentWorkbook) { alert("Abra primero el archivo original de la empresa."); return; }
        
        let hoja = currentWorkbook.worksheets[0];
        interstate_guardar_cabecera(hoja);

        let nom = document.getElementById("nombre").value.trim();
        let target_gab = document.getElementById("cb_gabinete").value;

        let fila_final = null;

        if (fila_seleccionada_idx !== null) {
            fila_final = fila_seleccionada_idx;
        } else {
            if(!target_gab) { alert("Por favor seleccione un Gabinete para insertar un nuevo registro."); return; }
            let encontrado_contexto = false;

            for(let fila = 13; fila <= 600; fila++) {
                let val_b = obtener_celda(hoja, fila, 2);
                let val_b_str = String(val_b).toUpperCase().replace(/\s+/g, ' ').trim();

                let norm_gab = "";
                if(val_b_str.includes("GABINETE") || val_b_str.includes("RACK")) {
                    let num = val_b_str.match(/\d+/);
                    norm_gab = num ? `GABINETE #${parseInt(num[0])}` : val_b_str;
                }

                if(norm_gab === target_gab) {
                    encontrado_contexto = true;
                    continue;
                }
                if(encontrado_contexto) {
                    if(val_b_str.includes("GABINETE") || val_b_str.includes("RACK")) { 
                        fila_final = fila - 1; 
                        break; 
                    }
                    if(!val_b || String(val_b).trim() === "") {
                        fila_final = fila;
                        break;
                    }
                }
            }

            if(!fila_final) {
                for(let f = 13; f <= 1000; f++){
                    let b = obtener_celda(hoja, f, 2);
                    if(!b || b === ""){
                        asignar_celda(hoja, f, 2, target_gab);
                        fila_final = f + 1;
                        break;
                    }
                }
            }
        }

        asignar_celda(hoja, fila_final, 2, nom);
        asignar_celda(hoja, fila_final, 3, document.getElementById("marca").value.trim());
        asignar_celda(hoja, fila_final, 4, document.getElementById("modelo").value.trim());
        asignar_celda(hoja, fila_final, 5, document.getElementById("ru_val").value.trim()); 
        asignar_celda(hoja, fila_final, 6, document.getElementById("serie").value.trim());    

        let turno_sel = document.getElementById("cb_horario").value;
        if(turno_sel) {
            let col_turno = mapa_columnas_horario[turno_sel] || 7;
            asignar_celda(hoja, fila_final, col_turno, document.getElementById("medicion_individual").value.trim());
        }
        asignar_celda(hoja, fila_final, 11, document.getElementById("cb_estado").value);
        asignar_celda(hoja, fila_final, col_observaciones, document.getElementById("txt_observaciones").value.trim());

        await actualizar_archivo_excel_fisico();

        alert(`¡Listo! El registro se actualizó directamente en la celda del Excel preservando el formato original.`);
        limpiar_campos();
        mostrar_por_gabinete();
    }

    async function modificar() {
        if(!currentWorkbook) { alert("Vincule primero el archivo Excel original."); return; }
        let hoja = currentWorkbook.worksheets[0];

        interstate_guardar_cabecera(hoja);

        if(fila_seleccionada_idx !== null) {
            asignar_celda(hoja, fila_seleccionada_idx, 2, document.getElementById("nombre").value.trim());
            asignar_celda(hoja, fila_seleccionada_idx, 3, document.getElementById("marca").value.trim());
            asignar_celda(hoja, fila_seleccionada_idx, 4, document.getElementById("modelo").value.trim());
            asignar_celda(hoja, fila_seleccionada_idx, 5, document.getElementById("ru_val").value.trim());
            asignar_celda(hoja, fila_seleccionada_idx, 6, document.getElementById("serie").value.trim());

            let turno_sel = document.getElementById("cb_horario").value;
            if(turno_sel) {
                let col_turno = mapa_columnas_horario[turno_sel] || 7;
                asignar_celda(hoja, fila_seleccionada_idx, col_turno, document.getElementById("medicion_individual").value.trim());
            }
            asignar_celda(hoja, fila_seleccionada_idx, 11, document.getElementById("cb_estado").value);
            asignar_celda(hoja, fila_seleccionada_idx, col_observaciones, document.getElementById("txt_observaciones").value.trim());
        }

        await actualizar_archivo_excel_fisico();
        alert("Modificaciones guardadas preservando el formato original.");
        limpiar_campos();
        mostrar_por_gabinete();
    }

    async function limpiar_registro() {
        if(!currentWorkbook || fila_seleccionada_idx === null) return;
        let menu = prompt("Escriba 'SI' para borrar el turno activo.\nEscriba 'NO' para remover el renglón completo.");
        if(!menu) return;

        let hoja = currentWorkbook.worksheets[0];

        if(menu.toUpperCase().trim() === "SI") {
            let turno_sel = document.getElementById("cb_horario").value;
            if(turno_sel) {
                let col_turno = mapa_columnas_horario[turno_sel] || 7;
                asignar_celda(hoja, fila_seleccionada_idx, col_turno, "");
            }
        } else if(menu.toUpperCase().trim() === "NO") {
            if(!confirm("¿Remover el renglón completo del equipo?")) return;
            for(let col = 2; col <= col_observaciones; col++) asignar_celda(hoja, fila_seleccionada_idx, col, "");
        }
        
        await actualizar_archivo_excel_fisico();
        limpiar_campos();
        mostrar_por_gabinete();
    }

    function limpiar_campos() {
        document.getElementById("nombre").value = "";
        document.getElementById("marca").value = "";
        document.getElementById("modelo").value = "";
        document.getElementById("ru_val").value = "";
        document.getElementById("serie").value = "";
        document.getElementById("medicion_individual").value = "";
        document.getElementById("txt_observaciones").value = "";
        document.getElementById("cb_gabinete").value = ""; 
        document.getElementById("cb_estado").value = ""; 
        fila_seleccionada_idx = null; 
    }
</script>
